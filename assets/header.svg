<svg xmlns="http://www.w3.org/2000/svg" width="880" height="150" viewBox="0 0 880 150" role="img" aria-label="Valentin — systems, networks and cybersecurity">
  <defs>
    <linearGradient id="hbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0b12"/>
      <stop offset="1" stop-color="#08080d"/>
    </linearGradient>
    <radialGradient id="hglow" cx="0.86" cy="0" r="0.9">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <rect x="0.75" y="0.75" width="878.5" height="148.5" rx="16" fill="url(#hbg)" stroke="#26263a" stroke-width="1.5"/>
  <rect x="0.75" y="0.75" width="878.5" height="148.5" rx="16" fill="url(#hglow)"/>

  <!-- faint network constellation -->
  <g stroke="#8b5cf6" stroke-opacity="0.28" stroke-width="1">
    <line x1="690" y1="46" x2="760" y2="30"/>
    <line x1="760" y1="30" x2="822" y2="70"/>
    <line x1="690" y1="46" x2="726" y2="96"/>
    <line x1="726" y1="96" x2="822" y2="70"/>
    <line x1="726" y1="96" x2="800" y2="118"/>
  </g>
  <g fill="#c4b5fd" fill-opacity="0.85">
    <circle cx="690" cy="46" r="2.6"/>
    <circle cx="822" cy="70" r="2.6"/>
    <circle cx="726" cy="96" r="2.6"/>
    <circle cx="800" cy="118" r="2.6"/>
  </g>
  <circle cx="760" cy="30" r="3.4" fill="#a78bfa"/>
  <circle cx="760" cy="30" r="7" fill="none" stroke="#a78bfa" stroke-opacity="0.4"/>

  <text x="42" y="52" font-family="ui-monospace, SFMono-Regular, 'Cascadia Mono', Consolas, monospace" font-size="12" letter-spacing="4.5" fill="#9b87f5">SYSTEMS · NETWORKS · CYBERSECURITY</text>

  <text x="40" y="108" font-family="-apple-system, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="50" font-weight="800" letter-spacing="-1.5" fill="#f3f3f8">Valentin</text>

  <rect x="43" y="122" width="94" height="4" rx="2" fill="url(#hbar)"/>
  <text x="152" y="126" font-family="ui-monospace, SFMono-Regular, 'Cascadia Mono', Consolas, monospace" font-size="12.5" fill="#6b6b80">@Vanish-pixel</text>
