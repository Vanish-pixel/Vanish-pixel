<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="460" viewBox="0 0 1200 460" role="img" aria-label="Hello — I am Valentin. Focused on systems, networks, cyber security and practical IT projects.">
  <!-- Dark hero card, styled after vanish-pixel.github.io/portfolio -->
  <defs>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
  </defs>

  <rect width="1200" height="460" fill="#070707"/>
  <rect width="1200" height="460" filter="url(#noise)" opacity="0.04"/>
  <rect x="0.5" y="0.5" width="1199" height="459" fill="none" stroke="#252525"/>

  <text x="70" y="100" font-family="ui-monospace, SFMono-Regular, 'Cascadia Mono', Consolas, monospace" font-size="15" letter-spacing="4" fill="#9cff57">HELLO</text>

  <text x="66" y="212" font-family="-apple-system, 'Segoe UI', Inter, 'Helvetica Neue', Arial, sans-serif" font-size="104" font-weight="800" letter-spacing="-4" fill="#f5f5f5">I am</text>
  <text x="66" y="316" font-family="-apple-system, 'Segoe UI', Inter, 'Helvetica Neue', Arial, sans-serif" font-size="104" font-weight="800" letter-spacing="-4" fill="none" stroke="#777777" stroke-width="1.6">Valentin.</text>

  <text x="70" y="390" font-family="-apple-system, 'Segoe UI', Inter, 'Helvetica Neue', Arial, sans-serif" font-size="21" fill="#909090">Focused on systems, networks, cyber security and practical IT projects.</text>
</svg>
